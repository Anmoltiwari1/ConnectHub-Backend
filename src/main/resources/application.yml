spring:
  application:
    name: media-service
  datasource:
    url: jdbc:h2:mem:mediadb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8084

aws:
  s3:
    mock: true
    bucket: connecthub-media
    base-url: http://localhost:8084/uploads
  storage:
    local-path: ./uploads
